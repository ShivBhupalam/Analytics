<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAT — Cashflow Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F7F8FA;color:#0F1724;font-family:'Libre Franklin',system-ui,sans-serif;font-size:14px;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap');

/* ─── Layout ─── */
.wr{max-width:1360px;margin:0 auto;padding:28px}
.wr-sm{max-width:880px;margin:0 auto;padding:40px 24px}

/* ─── Cards ─── */
.cd{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px}

/* ─── KPI grid ─── */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.kp{padding:18px 20px;border-radius:12px;background:#fff;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kp.alert{border-color:#FECACA;background:#FEF2F2}
.ki{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kl{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#9CA3AF}
.kv{font-size:24px;font-weight:700;color:#0F1724;letter-spacing:-.5px;margin-top:4px}
.ks{font-size:11.5px;color:#9CA3AF;margin-top:4px;line-height:1.5}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#6B7280;font-family:inherit;transition:background .15s}
.btn:hover{background:#F3F4F6}
.btn-dark{background:linear-gradient(135deg,#0F1724,#334155);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(15,23,36,.2)}
.btn-dark:hover{background:linear-gradient(135deg,#1E293B,#475569)}
.btn-primary{width:100%;padding:16px 24px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0F1724,#334155);color:#fff;box-shadow:0 4px 14px rgba(15,23,36,.3);font-family:inherit}
.btn-primary:disabled{background:#D1D5DB;color:#9CA3AF;box-shadow:none;cursor:not-allowed}

/* ─── Tabs ─── */
.tab-bar{display:flex;gap:1px;background:#fff;border-radius:10px;padding:4px;border:1px solid #E5E7EB}
.tab-btn{padding:8px 20px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#9CA3AF;font-family:inherit;transition:all .15s}
.tab-btn.active{background:#0F1724;color:#fff}
.vm-bar{display:flex;gap:2px;background:#F3F4F6;border-radius:8px;padding:3px}
.vm-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#9CA3AF;font-family:inherit}
.vm-btn.active{background:#0F1724;color:#fff}

/* ─── Table ─── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #E5E7EB}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;font-variant-numeric:tabular-nums}
th{padding:10px 12px;text-align:right;font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:#9CA3AF;border-bottom:2px solid #E5E7EB;background:#F3F4F6;white-space:nowrap}
th:first-child{text-align:left}
td{padding:10px 12px;text-align:right;border-bottom:1px solid #F0F1F3;white-space:nowrap}
td:first-child{text-align:left}
tr.danger-row td{background:#FEF2F2}
tfoot tr td{font-weight:700;border-top:2px solid #0F1724;border-bottom:none;font-size:13px}

/* ─── Pills ─── */
.pill{display:inline-block;padding:3px 8px;border-radius:6px;font-weight:700;font-size:11px}
.pill-g{background:#ECFDF5;color:#16A34A;border:1px solid #A7F3D0}
.pill-r{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.chg-g{color:#16A34A;font-weight:600}
.chg-r{color:#DC2626;font-weight:600}

/* ─── Status dot ─── */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ─── Alerts ─── */
.alert-bar{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:10px;font-size:12.5px;font-weight:500;line-height:1.55;margin-bottom:18px}
.alert-bar.red{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.alert-bar.green{background:#F0FDF4;border:1px solid #A7F3D0;color:#065F46}
.alert-bar.amber{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}

/* ─── Input form ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
label.lbl{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #E5E7EB;font-size:14px;font-family:inherit;color:#0F1724;background:#fff;outline:none}
input:focus,select:focus{border-color:#94A3B8}

/* ─── Upload zone ─── */
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border-radius:10px;border:2px dashed #D1D5DB;background:#FAFAFA;cursor:pointer;min-height:120px;text-align:center;transition:all .2s}
.upload-zone.done{border:2px solid #16A34A;background:#ECFDF5}
.upload-zone span{font-size:13px;font-weight:600;color:#6B7280;margin-top:8px}
.upload-zone.done span{color:#16A34A}

/* ─── DR rows ─── */
.dr{display:flex;align-items:center;padding:12px 14px;border-radius:10px;gap:14px;margin-bottom:2px}
.dr.od{background:#FEF2F2}
.dd-cal{width:56px;height:56px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}

/* ─── Bar chart legend ─── */
.legend{display:flex;gap:16px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:3px}

/* ─── Month-end badges ─── */
.me-badges{display:flex;gap:12px;flex-wrap:wrap}
.me-badge{padding:10px 16px;border-radius:8px;text-align:center;min-width:100px}

/* ─── Filter bar ─── */
.fbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-radius:10px;background:#F9FAFB;border:1px solid #F0F1F3;margin-bottom:14px}
.fbar input,.fbar select{padding:7px 10px;border-radius:7px;border:1px solid #E5E7EB;font-size:12px;font-family:inherit;color:#0F1724;outline:none;width:auto}

/* ─── Bar chart ─── */
.chart-wrap{position:relative;width:100%;overflow:hidden}
canvas{display:block}

/* ─── Toggle switch ─── */
.tog-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1px solid #E5E7EB;background:#FFFBEB;cursor:pointer;font-family:inherit}
.tog-btn.active{background:#ECFDF5;border-color:#A7F3D0}

/* ─── Controls bar ─── */
.ctrl-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.ctrl-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ─── BList ─── */
.blist-row{margin-bottom:10px}
.blist-label-row{display:flex;justify-content:space-between;margin-bottom:5px}
.blist-bar-bg{height:4px;background:#F3F4F6;border-radius:4px;overflow:hidden}
.blist-bar-fill{height:100%;border-radius:4px}

/* ─── Header ─── */
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px;padding-bottom:20px;border-bottom:1px solid #E5E7EB}
.dash-header-right{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.bank-badge{padding:10px 16px;border-radius:10px;background:#fff;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.prep-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border-radius:10px;background:#fff;border:1px solid #E5E7EB}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0F1724,#334155);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}

/* ─── 3-col grid ─── */
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* ─── Footer ─── */
.dash-footer{text-align:center;padding:28px 0 8px;font-size:12px;color:#6B7280;border-top:1px solid #E5E7EB;margin-top:24px}

/* ─── Misc ─── */
.show-all-btn{display:flex;align-items:center;gap:4px;margin:14px auto 0;padding:8px 16px;border-radius:8px;background:#F3F4F6;border:1px solid #E5E7EB;cursor:pointer;color:#6B7280;font-size:12px;font-weight:600;font-family:inherit}
.section-title{font-size:15px;font-weight:700;margin-bottom:2px}
.section-sub{font-size:11.5px;color:#9CA3AF;margin-bottom:14px}
.manual-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:#DBEAFE;color:#2563EB}
select.mo-sel{padding:8px 14px;border-radius:7px;border:1px solid #E5E7EB;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:#6B7280}

@media(max-width:700px){
  .grid-2,.grid-3,.grid-2-eq{grid-template-columns:1fr}
  .wr{padding:16px}
}
@media print{
  .btn,.tab-bar,.vm-bar,.tog-btn,.ctrl-bar,.fbar,.show-all-btn,.dash-header-right button{display:none!important}
  .cd{box-shadow:none}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MICRO CSV PARSER (no external deps)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseCSV(text) {
  var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  if (!lines.length) return [];
  var headers = splitCSVLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var vals = splitCSVLine(line);
    var row = {};
    headers.forEach(function(h, j) { row[h.trim()] = (vals[j] || '').trim(); });
    rows.push(row);
  }
  return rows;
}
function splitCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONSTANTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var SC = { overdue:"#DC2626", open:"#B45309", sent:"#2563EB", partial:"#7C3AED" };
var SBG = { overdue:"#FEF2F2", open:"#FFFBEB", sent:"#EFF6FF", partial:"#F5F3FF" };
var K = { bg:"#F7F8FA", w:"#FFF", bd:"#E5E7EB", bl:"#F0F1F3", tx:"#0F1724", mu:"#6B7280", lt:"#9CA3AF", gn:"#16A34A", gB:"#ECFDF5", gD:"#A7F3D0", rd:"#DC2626", rB:"#FEF2F2", rD:"#FECACA", bu:"#2563EB", bB:"#EFF6FF", am:"#D97706", aB:"#FFFBEB" };
var LOGO_SVG = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90"><text x="10" y="52" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="56" fill="#0F1724" letter-spacing="4">MAT</text><text x="12" y="74" font-family="Arial,sans-serif" font-weight="600" font-size="11.5" fill="#6B7280" letter-spacing="2.5">MICHIGAN ADDITIVE TECHNOLOGIES</text></svg>');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MATH & FORMAT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function r2(n) { return Math.round(n * 100) / 100; }
function f$(n) {
  var v = Math.abs(r2(n));
  var parts = v.toFixed(2).split(".");
  var ip = parts[0], dp = parts[1], wc = "";
  for (var i = ip.length - 1, ct = 0; i >= 0; i--, ct++) {
    if (ct > 0 && ct % 3 === 0) wc = "," + wc;
    wc = ip[i] + wc;
  }
  return "$" + wc + "." + dp;
}
function fRaw(s) {
  var str = String(s).replace(/[^0-9.]/g, "");
  if (!str) return "$0.00";
  var dot = str.indexOf(".");
  var ip = dot >= 0 ? str.slice(0, dot) : str;
  var dp = dot >= 0 ? (str.slice(dot + 1) + "00").slice(0, 2) : "00";
  if (!ip) ip = "0";
  var wc = "";
  for (var i = ip.length - 1, ct = 0; i >= 0; i--, ct++) {
    if (ct > 0 && ct % 3 === 0) wc = "," + wc;
    wc = ip[i] + wc;
  }
  return "$" + wc + "." + dp;
}
function fD(iso) { return new Date(iso + "T00:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }); }
function fDue(iso) { var d = new Date(iso + "T00:00:00"); return { d: d.getDate(), m: MN[d.getMonth()], y: d.getFullYear() }; }
function p2(n) { return String(n).padStart(2, "0"); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ENGINE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function genWeeks(asOf, endDate) {
  var s = new Date(asOf + "T00:00:00");
  var e = endDate ? new Date(endDate + "T00:00:00") : new Date(s.getFullYear(), s.getMonth() + 1, 0);
  var wks = [], cur = new Date(s);
  while (cur <= e) {
    var we = new Date(cur); we.setDate(we.getDate() + 6);
    if (we > e) we.setTime(e.getTime());
    var lab = MN[cur.getMonth()] + " " + cur.getDate() + "–" + (we.getMonth() === cur.getMonth() ? we.getDate() : MN[we.getMonth()] + " " + we.getDate());
    wks.push({ label: lab, start: cur.getFullYear() + "-" + p2(cur.getMonth()+1) + "-" + p2(cur.getDate()), end: we.getFullYear() + "-" + p2(we.getMonth()+1) + "-" + p2(we.getDate()) });
    cur = new Date(we); cur.setDate(cur.getDate() + 1);
  }
  return wks;
}
function wkI(dd, asOf, wks) {
  if (dd < asOf) return 0;
  for (var i = 0; i < wks.length; i++) { if (dd >= wks[i].start && dd <= wks[i].end) return i + 1; }
  return wks.length + 1;
}
function parseAP(rows, ints, asOf) {
  var mo = asOf.slice(0, 7);
  return rows.map(function(r) {
    var b = r2(parseFloat(r.balance || r.amount) || 0);
    var v = (r.vendor_name || "").trim(), d = (r.due_date || "").trim();
    var s = (r.status || "open").trim().toLowerCase(), t = (r.transaction_number || r.invoice_id || "").trim();
    var mod = false;
    (ints || []).forEach(function(o) { if (v.toLowerCase().includes(o.vendor) && d.slice(0,7) === mo) { b = r2(b * (1 + o.pct)); mod = true; } });
    return { v: v, b: b, d: d, s: s || "open", t: mod ? t + " (+interest)" : t };
  }).filter(function(x) { return x.b > 0 && x.d; });
}
function parseAR(rows) {
  return rows.map(function(r) {
    var s = (r.status || "sent").trim().toLowerCase();
    if (s === "partially_paid") s = "partial";
    return { c: (r.customer_name || "").trim(), b: r2(parseFloat(r.balance || r.amount) || 0), d: (r.due_date || "").trim(), s: s || "sent", t: (r.transaction_number || r.invoice_id || "").trim() };
  }).filter(function(x) { return x.b > 0 && x.d; });
}
function buildWeekly(ap, ar, bankVal, asOf, wks, pw, cp, inclOD) {
  var n = wks.length + 2;
  var apB = new Array(n).fill(0), arB = new Array(n).fill(0);
  var othOut = new Array(n).fill(0), othIn = new Array(n).fill(0);
  var arC = inclOD ? ar : ar.filter(function(x) { return x.s !== "overdue"; });
  ap.forEach(function(x) { var i = wkI(x.d, asOf, wks); if (x.t === "MANUAL") { othOut[i] = r2(othOut[i]+x.b); } else { apB[i] = r2(apB[i]+x.b); } });
  arC.forEach(function(x) { var i = wkI(x.d, asOf, wks); if (x.t === "MANUAL") { othIn[i] = r2(othIn[i]+x.b); } else { arB[i] = r2(arB[i]+x.b); } });
  var payA = new Array(n).fill(0), conA = new Array(n).fill(0);
  (pw || []).forEach(function(amt, i) { var bi = Math.min(i+1, n-2); payA[bi] = r2(payA[bi]+amt); });
  (cp || []).forEach(function(c) { var bi = Math.min(c.weekIdx+1, n-2); if (bi > 0 && bi < n-1) conA[bi] = r2(conA[bi]+c.amount); });
  var labels = ["Overdue"].concat(wks.map(function(w) { return w.label; })).concat(["Beyond"]);
  var rows = labels.map(function(lab, i) {
    var inf = r2(arB[i] + othIn[i]);
    var a = apB[i], p = payA[i], co = conA[i], oOut = othOut[i], oIn = othIn[i];
    var out = r2(a + oOut + p + co);
    return { week: lab, inflow: inf, arCSV: arB[i], ap: a, othOut: oOut, othIn: oIn, pay: p, con: co, outflow: out, net: r2(inf - out), balance: 0 };
  });
  var bal = r2(bankVal);
  rows.forEach(function(row) { bal = r2(bal + row.net); row.balance = bal; });
  return { labels: labels, rows: rows, apB: apB, arB: arB };
}
function buildDaily(ap, ar, bankVal, asOf, wks, pw, cp, inclOD) {
  var endStr = wks[wks.length-1].end;
  var startD = new Date(asOf+"T00:00:00"), endD = new Date(endStr+"T00:00:00");
  var dL = ["Overdue"], dD = [null], cur = new Date(startD);
  while (cur <= endD) {
    dL.push(MN[cur.getMonth()] + " " + cur.getDate());
    dD.push(cur.getFullYear()+"-"+p2(cur.getMonth()+1)+"-"+p2(cur.getDate()));
    cur.setDate(cur.getDate()+1);
  }
  dL.push("Beyond"); dD.push(null);
  var dn = dL.length;
  var apB = new Array(dn).fill(0), arB = new Array(dn).fill(0);
  var othOut = new Array(dn).fill(0), othIn = new Array(dn).fill(0);
  var arC = inclOD ? ar : ar.filter(function(x) { return x.s !== "overdue"; });
  var gi = function(dd) { if (dd < asOf) return 0; var idx = dD.indexOf(dd); return idx > 0 ? idx : dn-1; };
  ap.forEach(function(x) { var i = gi(x.d); if (x.t === "MANUAL") { othOut[i] = r2(othOut[i]+x.b); } else { apB[i] = r2(apB[i]+x.b); } });
  arC.forEach(function(x) { var i = gi(x.d); if (x.t === "MANUAL") { othIn[i] = r2(othIn[i]+x.b); } else { arB[i] = r2(arB[i]+x.b); } });
  var payA = new Array(dn).fill(0), conA = new Array(dn).fill(0);
  wks.forEach(function(w, wi) {
    var di = dD.indexOf(w.start);
    if (di > 0) {
      payA[di] = r2(payA[di] + ((pw||[])[wi]||0));
      (cp||[]).filter(function(c) { return c.weekIdx === wi; }).forEach(function(c) { conA[di] = r2(conA[di]+c.amount); });
    }
  });
  var rows = dL.map(function(lab, i) {
    var inf = r2(arB[i]+othIn[i]);
    var a = apB[i], p = payA[i], co = conA[i], oOut = othOut[i], oIn = othIn[i];
    var out = r2(a+oOut+p+co);

// CANVAS CHART LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawComboChart(canvasId, rows) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 700;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = 280 * window.devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = '280px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  var w = W, h = 280;
  var pad = { top: 20, right: 20, bottom: 50, left: 70 };
  var cW = w - pad.left - pad.right;
  var cH = h - pad.top - pad.bottom;
  ctx.clearRect(0, 0, w, h);

  var disp = rows.filter(function(r, i) {
    return !(i > 0 && i < rows.length-1 && r.inflow===0 && r.ap===0 && r.pay===0 && r.net===0);
  });
  var n = disp.length;
  if (n === 0) return;

  var allVals = disp.map(function(r){return r.balance;}).concat(disp.map(function(r){return r.inflow;})).concat(disp.map(function(r){return -r.outflow;}));
  var minV = Math.min.apply(null, allVals), maxV = Math.max.apply(null, allVals);
  var pad1 = Math.max((maxV - minV) * 0.15, 1000);
  var yMin = minV - pad1, yMax = maxV + pad1;
  function yPos(v) { return pad.top + cH - ((v - yMin) / (yMax - yMin)) * cH; }
  function xPos(i) { return pad.left + (i + 0.5) * (cW / n); }

  ctx.strokeStyle = 'rgba(0,0,0,.05)';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 5; g++) {
    var yV = yMin + (yMax - yMin) * g / 5;
    var yP = yPos(yV);
    ctx.beginPath(); ctx.moveTo(pad.left, yP); ctx.lineTo(pad.left + cW, yP); ctx.stroke();
    ctx.fillStyle = '#9CA3AF'; ctx.font = '10px Libre Franklin,system-ui';
    ctx.textAlign = 'right';
    var label = (yV >= 0 ? '' : '-') + '$' + (Math.abs(yV)/1000).toFixed(0) + 'k';
    ctx.fillText(label, pad.left - 8, yP + 3);
  }

  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = 'rgba(220,38,38,.3)'; ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    var y0 = yPos(0);
    ctx.beginPath(); ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left+cW, y0); ctx.stroke();
    ctx.setLineDash([]);
  }

  var bw = Math.max(4, Math.min(30, (cW / n) * 0.35));

  disp.forEach(function(r, i) {
    var x = xPos(i);
    var y0 = yPos(0);
    if (r.inflow > 0) {
      var yTop = yPos(r.inflow);
      ctx.fillStyle = 'rgba(22,163,74,.75)';
      var bh = Math.max(1, y0 - yTop);
      ctx.beginPath();
      ctx.rect(x - bw - 2, yTop, bw, bh);
      ctx.fill();
    }
    if (r.outflow > 0) {
      var yTop2 = yPos(0), yBot = yPos(-r.outflow);
      ctx.fillStyle = 'rgba(220,38,38,.65)';
      var bh2 = Math.max(1, yBot - yTop2);
      ctx.beginPath();
      ctx.rect(x + 2, yTop2, bw, bh2);
      ctx.fill();
    }
  });

  ctx.strokeStyle = '#0F1724'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath();
  disp.forEach(function(r, i) {
    var x = xPos(i), y = yPos(r.balance);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  var grd = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
  grd.addColorStop(0, 'rgba(15,23,36,.08)');
  grd.addColorStop(1, 'rgba(15,23,36,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  disp.forEach(function(r, i) { var x = xPos(i), y = yPos(r.balance); i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.lineTo(xPos(n-1), yPos(0)); ctx.lineTo(xPos(0), yPos(0)); ctx.closePath(); ctx.fill();

  disp.forEach(function(r, i) {
    var x = xPos(i), y = yPos(r.balance);
    ctx.beginPath(); ctx.arc(x, y, n > 30 ? 2 : 4, 0, 2*Math.PI);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#0F1724'; ctx.lineWidth = 2; ctx.stroke();
  });

  ctx.fillStyle = '#9CA3AF'; ctx.textAlign = 'center'; ctx.font = (n > 20 ? '8' : '10') + 'px Libre Franklin,system-ui';
  var step = Math.max(1, Math.floor(n / 12));
  disp.forEach(function(r, i) {
    if (i % step !== 0) return;
    ctx.save();
    var x = xPos(i);
    if (n > 15) {
      ctx.translate(x, h - pad.bottom + 14);
      ctx.rotate(-0.7);
      ctx.fillText(r.week, 0, 0);
    } else {
      ctx.fillText(r.week, x, h - pad.bottom + 16);
    }
    ctx.restore();
  });
}

function drawBarChart(canvasId, data, key, color, yLabel) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 500;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = 200 * window.devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = '200px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  var w = W, h = 200;
  var pad = { top: 16, right: 10, bottom: 40, left: 60 };
  var cW = w - pad.left - pad.right, cH = h - pad.top - pad.bottom;
  ctx.clearRect(0, 0, w, h);
  var n = data.length;
  if (!n) return;
  var maxV = Math.max.apply(null, data.map(function(d){ return d[key]; })) || 1;
  maxV = maxV * 1.15;
  function yP(v){ return pad.top + cH - (v/maxV)*cH; }
  function xP(i){ return pad.left + (i+0.5)*(cW/n); }
  for (var g=0;g<=4;g++){
    var yv = (g/4)*maxV, yp = yP(yv);
    ctx.strokeStyle='rgba(0,0,0,.05)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,yp); ctx.lineTo(pad.left+cW,yp); ctx.stroke();
    ctx.fillStyle='#9CA3AF'; ctx.font='10px system-ui'; ctx.textAlign='right';
    ctx.fillText('$'+(yv/1000).toFixed(0)+'k', pad.left-6, yp+3);
  }
  var bw = Math.max(4, Math.min(38, (cW/n)*0.6));
  data.forEach(function(d,i){
    if (!d[key]) return;
    var x=xP(i), yTop=yP(d[key]), barH=yP(0)-yTop;
    ctx.fillStyle=color;
    ctx.fillRect(x-bw/2,yTop,bw,barH);
  });
  ctx.fillStyle='#9CA3AF'; ctx.textAlign='center'; ctx.font=(n>12?'8':'9')+'px system-ui';
  var step=Math.max(1,Math.floor(n/10));
  data.forEach(function(d,i){
    if(i%step!==0)return;
    ctx.fillText(d.week||d.label||'', xP(i), h-pad.bottom+14);
  });
}

function handleFile(input, type) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var rows = parseCSV(e.target.result);
    if (type === 'ap') { IS.apFile = rows; IS.apN = file.name; }
    else { IS.arFile = rows; IS.arN = file.name; }
    renderApp();
  };
  reader.readAsText(file);
}

  h += '<span>' + (IS.apN || 'Upload AP CSV') + '</span>';
  h += '</label>';
  h += '<label class="upload-zone' + (IS.arN ? ' done' : '') + '" onclick="document.getElementById(\'ar-file-inp\').click()">';
  h += (IS.arN ? '<span style="color:#16A34A">' + SVG.check + '</span>' : '<span style="color:#9CA3AF">' + SVG.upload + '</span>');
  h += '<span>' + (IS.arN || 'Upload AR CSV') + '</span>';
  h += '</label>';
  h += '</div>';
  h += '<input type="file" id="ap-file-inp" accept=".csv" style="display:none" onchange="handleFile(this,\'ap\')">';
  h += '<input type="file" id="ar-file-inp" accept=".csv" style="display:none" onchange="handleFile(this,\'ar\')">';
  h += '</div>';

  h += '<div class="cd" style="padding:24px">';
  h += '<div style="font-size:14px;font-weight:700;margin-bottom:16px">Weekly Payroll ('+wks.length+' weeks)</div>';
  h += '<div class="grid-auto">';
  wks.forEach(function(w, i) {
    h += '<div><label class="lbl">'+escapeHTML(w.label)+'</label><input type="number" placeholder="12500" value="'+(IS.pw[i]||'')+'" oninput="IS.pw['+i+']=this.value"></div>';
  });
  h += '</div></div>';

  h += '<div class="cd" style="padding:24px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div style="font-size:14px;font-weight:700">Consultant Payments</div>';
  h += '<button class="btn" onclick="IS.cons.push({amount:\'\',weekIdx:\'0\'});renderApp()">+ Add</button>';
  h += '</div>';
  IS.cons.forEach(function(c, i) {
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:10px;margin-bottom:8px;align-items:flex-end">';
    h += '<div><label class="lbl">Amount</label><input type="number" placeholder="3500" value="'+escapeHTML(c.amount)+'" oninput="IS.cons['+i+'].amount=this.value"></div>';
    h += '<div><label class="lbl">Week</label><select oninput="IS.cons['+i+'].weekIdx=this.value">';
    wks.forEach(function(w, j){ h += '<option value="'+j+'"'+(c.weekIdx==j?' selected':'')+'>'+escapeHTML(w.label)+'</option>'; });
    h += '</select></div>';
    h += '<button onclick="IS.cons.splice('+i+',1);renderApp()" style="background:none;border:none;cursor:pointer;padding:10px 0;color:#9CA3AF">'+SVG.x+'</button>';
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="cd" style="padding:24px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div style="font-size:14px;font-weight:700">Other Expenses / Income</div>';
  h += '<button class="btn" onclick="IS.others.push({desc:\'\',amount:\'\',type:\'payable\',dueDate:\'\'});renderApp()">+ Add</button>';
  h += '</div>';
  IS.others.forEach(function(o, i) {
    h += '<div style="display:grid;grid-template-columns:1.5fr 110px 120px 130px 32px;gap:10px;margin-bottom:10px;align-items:flex-end">';
    h += '<div><label class="lbl">Description</label><input style="width:100%" placeholder="Equipment" value="'+escapeHTML(o.desc)+'" oninput="IS.others['+i+'].desc=this.value"></div>';
    h += '<div><label class="lbl">Amount</label><input type="number" style="width:100%" placeholder="5000" value="'+escapeHTML(String(o.amount))+'" oninput="IS.others['+i+'].amount=this.value"></div>';
    h += '<div><label class="lbl">Type</label><select style="width:100%;color:'+(o.type==='payable'?K.rd:K.gn)+';font-weight:600" oninput="IS.others['+i+'].type=this.value;renderApp()">';
    h += '<option value="payable"'+(o.type==='payable'?' selected':'')+'>Payable</option><option value="receivable"'+(o.type==='receivable'?' selected':'')+'>Receivable</option>';
    h += '</select></div>';
    h += '<div><label class="lbl">Due Date</label><input type="date" style="width:100%" value="'+(o.dueDate||'')+'" onchange="IS.others['+i+'].dueDate=this.value"></div>';
    h += '<button onclick="IS.others.splice('+i+',1);renderApp()" style="background:none;border:none;cursor:pointer;padding:10px 0;color:#9CA3AF">'+SVG.x+'</button>';
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="cd" style="padding:24px;margin-bottom:24px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div style="font-size:14px;font-weight:700">Interest Adjustments (Optional)</div>';
  h += '<button class="btn" onclick="IS.ints.push({vendor:\'\',pct:\'1\'});renderApp()">+ Add</button>';
  h += '</div>';
  IS.ints.forEach(function(x, i) {
    h += '<div style="display:grid;grid-template-columns:1fr 100px 32px;gap:10px;margin-bottom:8px;align-items:flex-end">';
    h += '<div><label class="lbl">Vendor</label><input placeholder="Youngsun" value="'+escapeHTML(x.vendor)+'" oninput="IS.ints['+i+'].vendor=this.value"></div>';
    h += '<div><label class="lbl">Interest %</label><input type="number" placeholder="1" value="'+escapeHTML(String(x.pct))+'" oninput="IS.ints['+i+'].pct=this.value"></div>';
    h += '<button onclick="IS.ints.splice('+i+',1);renderApp()" style="background:none;border:none;cursor:pointer;padding:10px 0;color:#9CA3AF">'+SVG.x+'</button>';
    h += '</div>';
  });
  h += '</div>';

  var ok = IS.apFile && IS.arFile && IS.bank && IS.asOf;
  h += '<button class="btn-primary" ' + (ok ? '' : 'disabled') + ' onclick="generateDashboard()">';
  h += '<span style="margin-right:6px">' + SVG.play + '</span> Generate Dashboard';
  h += '</button>';
  h += '</div>';
  return h;
}

function renderDashboard() {
  var d = S.data, inp = S.input;
  var isD = S.vm === 'daily';
  var fullPos = isD ? d.daily : d.weekly;
  var filtRows = filterRows(fullPos.rows, isD, S.moF, inp.asOfDate, inp.generatedWeeks);
  var sBg = d.inclOD ? K.gB : K.aB;
  var sC = d.inclOD ? K.gn : K.am;
  var dl = fD(inp.asOfDate);

  var h = '<div class="wr">';
  h += '<div class="dash-header">';
  h += '<div>';
  h += '<img src="' + LOGO_SVG + '" alt="MAT" style="height:48px;margin-bottom:6px">';
  h += '<h1 style="font-size:25px;font-weight:700;margin:3px 0;letter-spacing:-.5px">Cashflow Dashboard</h1>';
  h += '<p style="color:' + K.mu + ';font-size:12.5px">As of ' + dl + '</p>';
  h += '</div>';
  h += '<div class="dash-header-right">';
  h += '<div class="bank-badge"><div style="font-size:11px;color:' + K.lt + ';font-weight:500;text-transform:uppercase">Bank Balance</div><div style="font-size:21px;font-weight:700">' + fRaw(d.bankDisplay) + '</div></div>';
  h += '<button class="btn" onclick="S.screen=\'input\';renderApp()">' + SVG.reset + ' New Report</button>';
  h += '<button class="btn btn-dark" onclick="exportHTML()">' + SVG.download + ' Export HTML</button>';
  h += '</div></div>';

  h += '<div class="ctrl-bar">';
  h += '<div class="ctrl-left">';
  h += '<div class="tab-bar">';
  [['overview','Overview'],['payables','Payables (AP)'],['receivables','Receivables (AR)']].forEach(function(t) {
    h += '<button class="tab-btn' + (S.tab === t[0] ? ' active' : '') + '" onclick="S.tab=\'' + t[0] + '\';renderApp()">' + t[1] + '</button>';
  });
  h += '</div>';
  if (d.months && d.months.length > 1) {
    h += '<select class="mo-sel" onchange="S.moF=this.value;renderApp()">';
    h += '<option value="all"' + (S.moF==='all'?' selected':'') + '>All Months</option>';
    d.months.forEach(function(m){ var p=m.split('-'); h += '<option value="'+m+'"'+(S.moF===m?' selected':'')+'>'+MN[parseInt(p[1])-1]+' '+p[0]+'</option>'; });
    h += '</select>';
  }
  h += '</div>';
  h += '<button class="tog-btn' + (d.inclOD ? ' active' : '') + '" onclick="toggleOD()">';
  h += '<span style="color:' + sC + ';font-size:16px">' + (d.inclOD ? SVG.check : SVG.bolt) + '</span>';
  h += '<div style="text-align:left"><div style="font-size:12px;font-weight:700;color:' + sC + '">' + (d.inclOD ? 'Showing: Ideal scenario' : 'Showing: Realistic scenario') + '</div><div style="font-size:10px;color:' + K.mu + '">Click to toggle overdue AR</div></div>';
  h += '</button>';
  h += '</div>';

  if (S.tab === 'overview') {
    h += '<div class="kg">';
    h += kpiHTML(SVG.wallet, 'Cash at Bank', fRaw(d.bankDisplay), 'Current', K.bB, K.bu, false);
    h += kpiHTML(SVG.up, 'Expected AR', f$(d.tAR - d.odAR), (d.ar.length - d.odARn) + ' collectible', K.gB, K.gn, false);
    h += kpiHTML(SVG.down, 'Total AP', f$(d.tAP), d.ap.length + ' bills', K.rB, K.rd, false);
    h += kpiHTML(SVG.trend, 'Period-End', f$(d.eom), 'Forecasted', d.eom >= 0 ? K.gB : K.rB, d.eom >= 0 ? K.gn : K.rd, false);
    h += '</div>';

    h += '<div class="cd" style="padding:20px 20px 14px">';
    h += '<div class="chart-wrap"><canvas id="combo-chart" style="width:100%;height:280px"></canvas></div>';
    h += '</div>';

    h += '<div class="cd" style="padding:22px 24px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
    h += '<span class="section-title">' + (isD ? 'Daily' : 'Weekly') + ' Net Position</span>';
    h += '<div class="vm-bar"><button class="vm-btn' + (S.vm==='weekly'?' active':'') + '" onclick="S.vm=\'weekly\';renderApp()">Weekly</button><button class="vm-btn' + (S.vm==='daily'?' active':'') + '" onclick="S.vm=\'daily\';renderApp()">Daily</button></div>';
    h += '</div>';
    h += '<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">Period</th><th>AR Inflow</th><th>AP Out</th><th>Payroll</th><th>Net</th><th>Balance</th></tr></thead><tbody>';
    filtRows.forEach(function(r) {
      h += '<tr' + (r.balance < 0 ? ' class="danger-row"' : '') + '>';
      h += '<td style="font-weight:600">' + escapeHTML(r.week) + '</td>';
      h += '<td style="color:' + K.gn + '">' + (r.arCSV > 0 ? f$(r.arCSV) : '—') + '</td>';
      h += '<td>' + (r.ap > 0 ? f$(r.ap) : '—') + '</td>';
      h += '<td>' + (r.pay > 0 ? f$(r.pay) : '—') + '</td>';
      h += '<td>' + chgHTML(r.net) + '</td>';
      h += '<td>' + pillHTML(r.balance) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  if (S.tab === 'payables') {
    h += '<div class="cd" style="padding:20px 20px 14px">';
    h += '<div class="section-title">AP Due by Week</div>';
    h += '<div class="chart-wrap"><canvas id="ap-chart" style="width:100%;height:200px"></canvas></div>';
    h += '</div>';
    h += '<div class="cd">';
    applyF(d.ap, S.apF, 'ap', inp.asOfDate).slice(0, 50).forEach(function(x) { h += drHTML(x, 'ap', inp.asOfDate); });
    h += '</div>';
  }

  if (S.tab === 'receivables') {
    h += '<div class="cd" style="padding:20px 20px 14px">';
    h += '<div class="section-title">AR Due by Week</div>';
    h += '<div class="chart-wrap"><canvas id="ar-chart" style="width:100%;height:200px"></canvas></div>';
    h += '</div>';
    h += '<div class="cd">';
    applyF(d.ar, S.arF, 'ar', inp.asOfDate).slice(0, 50).forEach(function(x) { h += drHTML(x, 'ar', inp.asOfDate); });
    h += '</div>';
  }

  h += '<div class="dash-footer">Prepared by Shiv Bhupalam · ' + dl + '</div>';
  h += '</div>';
  return h;
}

window.addEventListener('resize', function() {
  if (S.screen === 'dashboard') renderApp();
});

renderApp();
</script>
</body>
</html>
